<!DOCTYPE html>
<html>
<head>
  <title>Eli Kenemore — Resume</title>
  <style>
    body { margin: 0; padding: 2rem; font-family: Calibri, sans-serif; max-width: 8.5in; margin-inline: auto; }
  </style>
</head>
<body>
  <div id="resume">Loading…</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
  <script>
    fetch("Eli_Kenemore_Resume (4).docx")
      .then(r => r.arrayBuffer())
      .then(buf => mammoth.convertToHtml({ arrayBuffer: buf }))
      .then(res => document.getElementById("resume").innerHTML = res.value)
      .catch(err => document.getElementById("resume").textContent = "Error: " + err);
  </script>
</body>
</html>
